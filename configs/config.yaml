# ── VERA-Robot-Learning Configuration ─────────────────────────────────────────
# Vision-Language-Language-Action model with dual semantic+numerical feedback.
# DEFAULT: Language-Table (Lynch et al., 2023) — 2-DoF planar push tasks.
# See "Dataset Presets" section below for CALVIN / MetaWorld overrides.
#
# ── Accuracy vs generalisation (quick playbook) ─────────────────────────────
# • Keep unfreeze_clip_vision: true for LT/CALVIN (frozen ViT often caps accuracy).
# • If train_acc ≫ val_acc: raise data.train_window_stride (2→3), raise
#   label_smoothing / weight_decay slightly, or lower training.clip_vision_lr.
# • If both accs are low: lower train_window_stride to 1, lower dropout /
#   vision_token_dropout, try label_smoothing 0.05.
# • training.ema_decay (e.g. 0.999) + validate_with_ema: true smooths weights and
#   often improves *val* without freezing the backbone; best_sft_vera.pt stores
#   the EMA-averaged weights when validate_with_ema is on.
# • More real episodes + diverse tasks beats any hyperparameter tweak.

# ── Model ─────────────────────────────────────────────────────────────────────
model:
  num_actions:    8           # discrete action space size
                              # Language-Table: 8 directional bins (arctan2 sectors)
  history_len:    4           # number of (action, reward) history steps
  num_vis_frames: 3           # number of video frames per observation
  fusion_layers:  6           # causal fusion transformer depth
  fusion_heads:   8           # attention heads in fusion transformer
  d_model:        256         # shared embedding dimension
  d_ff_scale:     4           # feedforward dim = d_model * d_ff_scale
  dropout:        0.18       # fusion + heads — middle ground
  vision_token_dropout: 0.08  # on projected vision tokens (train only); 0 to disable
  freeze_clip:    true        # text frozen; vision follows unfreeze_clip_vision
  unfreeze_clip_vision: true  # needed for strong LT/CALVIN accuracy vs ImageNet ViT
  action_dim:     2           # continuous action vector dimension — MUST match dataset
                              # Language-Table=2 [Δx,Δy]  MetaWorld=4  CALVIN=7
  chunk_size:     4           # π0-style multi-step CE; use 2 or 1 if you see temporal overfit

# ── VERA-Specific Settings ─────────────────────────────────────────────────────
vera:
  # Ablation flags: set any to false to run ablation experiments
  use_lang_feedback:      true    # Stream 3: action language feedback [core novelty]
  use_temporal_history:   true    # TemporalHistoryTransformer over numerical history
  use_reward_gate:        true    # reward-conditioned gate on semantic feedback
  use_consequence_token:  true    # Stream 3b: separate CLIP token for action outcome [NEW]
                                  # encodes WHAT HAPPENED (not what action was taken)
                                  # strings generated dynamically from reward + state_delta
                                  # token sequence: L_instr | L_action | L_consequence | V | H | CLS

  # Auxiliary contrastive alignment loss coefficient (λ_align)
  # Applied to BOTH action and consequence alignment terms (averaged).
  #
  # Why 0.05 (default): on Language-Table, InfoNCE stays near log(B)≈3.46 (weak
  # in-batch reward contrast). At λ=0.1 that is ~0.35 loss units of mostly noise
  # vs CE; 0.05 halves that while keeping projection heads active. Set 0.0 to ablate.
  alignment_loss_coef:    0.05

  # Continuous action regression loss coefficient (λ_reg)
  # MSE between predicted action_vec and expert's executed action vector.
  # Only active when dataset supplies action_vectors (CALVIN, Language-Table, MetaWorld).
  # Set to 0.0 to ablate the regression head (discrete-only baseline).
  regression_loss_coef:   0.5   # restore if continuous head helps your dataset

  # Language-Table 8-bin angle-quantised action vocabulary.
  # Bins correspond to arctan2(Δy,Δx) quantised into 8 equal sectors (π/4 each).
  # These domain-specific strings give E_act stronger semantic signal than the
  # generic "I performed action N" fallback used for MetaWorld / synthetic data.
  action_vocab:
    0: "I pushed the object to the right"
    1: "I pushed the object up and to the right"
    2: "I pushed the object upward"
    3: "I pushed the object up and to the left"
    4: "I pushed the object to the left"
    5: "I pushed the object down and to the left"
    6: "I pushed the object downward"
    7: "I pushed the object down and to the right"

# ── Data ──────────────────────────────────────────────────────────────────────
data:
  episodes_path:       null     # ← SET THIS to your Language-Table root directory
                                # e.g. /content/drive/MyDrive/language_table_data
                                # null → falls back to synthetic episodes (for testing)
  dataset_type:        language_table  # "pkl" | "language_table" | "calvin"
                                       # language_table: expects root/episode_XXX/steps.pkl
                                       # calvin:         expects root/training/*.npz + lang_annotations/
  calvin_split:        training # only used when dataset_type=calvin
  synthetic_episodes:  200      # episodes to generate when no real data provided
  ep_len:              30       # average episode length for synthetic data
  img_size:            224      # resize all frames to this square size
  augment_train:       true
  train_window_stride: 2     # train only: fewer correlated windows; use 1 for max train signal
  augment_noise_std:   0.014 # train only; 0 disables

# ── Supervised Fine-Tuning (Behavioural Cloning) ──────────────────────────────
training:
  device:                auto   # "cuda" | "mps" | "cpu" | "auto"
  epochs:                80     # enough for LT; early stopping fires if no improvement
  batch_size:            32
  lr:                    3e-4
  lr_min:                1e-6
  weight_decay:          6e-4
  label_smoothing:       0.08
  grad_clip:             1.0
  val_fraction:          0.12   # slightly more val stability; 0.1 if you need every episode for train
  split_seed:            42    # fixed seed for episode-level train/val split
                               # ensures identical split on resume — prevents
                               # inflated val_acc from cross-run window leakage
  num_workers:           2
  save_every:            10
  output_dir:            checkpoints/
  early_stopping_patience: 25   # stop after N epochs with no val_acc improvement
  clip_vision_lr:        2e-6   # LR for unfrozen CLIP vision — slow adaptation;
                                 # 3e-6 still allowed train≫val; 2e-6 is gentler for Colab reruns.
  # Exponential moving average: often lifts val accuracy vs raw online weights.
  # Set ema_decay to 0 to disable.
  ema_decay:             0.999
  validate_with_ema:     true   # if true, val metrics + best checkpoint use EMA weights

# ── Online RL Fine-Tuning ──────────────────────────────────────────────────────
rl:
  epochs:              200
  num_rollouts:        4         # rollout episodes per gradient update
  max_episode_steps:   50
  gamma:               0.99      # discount factor
  lr:                  1e-5      # lower than SFT to prevent catastrophic forgetting
  weight_decay:        1e-4
  grad_clip:           1.0
  entropy_coef:        0.01      # exploration bonus coefficient
  vf_coef:             0.5       # value function loss weight
  kl_coef:             0.1       # KL divergence penalty against BC policy

# ── Environment ────────────────────────────────────────────────────────────────
env:
  env_id:               dummy    # "dummy" | any Gym/MiniGrid env id
  instruction:          "complete the task"
  domain_randomization: false
  obs_noise_std:        5.0

# ── Evaluation ─────────────────────────────────────────────────────────────────
eval:
  num_episodes:      50
  success_threshold: 1.0         # min total return to count as success

# ── Ablation Study Presets ─────────────────────────────────────────────────────
# To run an ablation, override the vera section from the command line or
# create a separate config file that inherits these defaults.
#
# Ablation A — base VLA (no language feedback):
#   vera.use_lang_feedback: false
#
# Ablation B — no temporal history transformer:
#   vera.use_temporal_history: false
#
# Ablation C — no reward gate:
#   vera.use_reward_gate: false
#
# Ablation D — no contrastive alignment loss:
#   vera.alignment_loss_coef: 0.0
#
# Ablation E — no language feedback AND no temporal history (minimal model):
#   vera.use_lang_feedback: false
#   vera.use_temporal_history: false
#
# Ablation F — action token only, no consequence token (original Stream 3):
#   vera.use_consequence_token: false
#
# Ablation G — consequence token only, no action token (isolate outcome signal):
#   vera.use_lang_feedback: true
#   vera.use_consequence_token: true
#   action_vocab: null   # action token still present; consequence ablated separately above

# ── Dataset Presets ─────────────────────────────────────────────────────────────
# Language-Table is the DEFAULT above.  To switch to other datasets, override:
#
# MetaWorld (generic pick-place):
#   data:
#     episodes_path:    /path/to/metaworld.pkl
#     dataset_type:     pkl
#   model:
#     action_dim:       4       # [Δx, Δy, Δz, gripper]
#   vera:
#     action_vocab:     null    # use built-in generic "I performed action N"
#
# CALVIN:
#   data:
#     episodes_path:    /path/to/calvin_root   # dir with training/ and validation/
#     dataset_type:     calvin
#     calvin_split:     training
#   model:
#     num_actions:      8       # 8 dominant-axis bins (xyz roll pitch yaw + gripper)
#     action_dim:       7       # full 7-DoF [x,y,z,roll,pitch,yaw,gripper]
#   vera:
#     action_vocab:     null
#
# Synthetic (pipeline testing only — no real robot data):
#   data:
#     episodes_path:    null
#     dataset_type:     pkl
#   model:
#     action_dim:       4
#   vera:
#     action_vocab:     null
#
# Run command (any dataset):
#   python -m training.sft_trainer_vera --config configs/config.yaml
